<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Checkout Demo</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><header class="site-header sticky-top"><nav class="navbar navbar-expand-lg py-3"><div class="container"><a class="navbar-brand brand" href="index.html"><span class="brand-mark">Eco</span><span class="brand-text">products</span></a><div class="d-flex gap-2"><a class="button button-secondary py-2 px-3" href="cart.html">Back to Cart</a><a class="cart-button btn" href="cart.html">Cart <span class="cart-count" data-cart-count>0</span></a></div></div></nav></header><section class="py-5"><div class="container"><div class="section-heading mb-4"><p class="eyebrow">Checkout</p><h1 class="cart-title">Complete your order.</h1></div><div class="row g-4"><div class="col-lg-7"><div class="checkout-card"><h2 class="auth-title">Shipping details</h2><p class="hero-text mt-2">Static checkout page for GitHub Pages demo.</p><form class="checkout-form mt-4"><div class="row g-3"><div class="col-md-6"><label class="form-label">Full Name</label><input class="form-control" type="text" placeholder="Your full name"></div><div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email" placeholder="Your email"></div><div class="col-12"><label class="form-label">Phone</label><input class="form-control" type="text" placeholder="Phone number"></div><div class="col-12"><label class="form-label">Shipping Address</label><textarea class="form-control checkout-textarea" placeholder="Enter your address"></textarea></div></div><a class="button button-primary w-100 mt-4" href="success.html">Place Demo Order</a></form></div></div><div class="col-lg-5"><aside class="summary-card"><p class="eyebrow">Order summary</p><div class="summary-line"><span>Frontend-only demo</span><strong>No backend</strong></div><div class="summary-line total"><span>Status</span><strong>Static</strong></div></aside></div></div></div></section><script src="data.js"></script><script src="app.js"></script></body></html>
