<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header sticky-top">
        <nav class="navbar navbar-expand-lg py-3">
            <div class="container">
                <a class="navbar-brand brand" href="index.html">
                    <span class="brand-mark">Eco</span><span class="brand-text">products</span>
                </a>
                <div class="d-flex gap-2">
                    <a class="button button-secondary py-2 px-3" href="index.html">Home</a>
                    <a class="cart-button btn" href="cart.html">Cart <span class="cart-count" data-cart-count>0</span></a>
                </div>
            </div>
        </nav>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="section-heading mb-4">
                <p class="eyebrow">Shopping cart</p>
                <h1 class="cart-title">Your eco picks, ready to ship.</h1>
            </div>
            <div class="row g-4">
                <div class="col-lg-8">
                    <div id="demo-cart-items" class="cart-table"></div>
                </div>
                <div class="col-lg-4">
                    <aside class="summary-card">
                        <p class="eyebrow">Order summary</p>
                        <div class="summary-line"><span>Items</span><strong data-cart-count>0</strong></div>
                        <div class="summary-line"><span>Delivery</span><strong>Free</strong></div>
                        <div class="summary-line total"><span>Total</span><strong id="demo-cart-total">Rs. 0</strong></div>
                        <a class="button button-primary w-100 mt-3" href="checkout.html">Proceed to Checkout</a>
                    </aside>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer py-4">
        <div class="container text-center">
            <p class="footer-copy mb-0">Developed by Jayasri</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
